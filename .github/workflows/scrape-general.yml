name: Scrape general lottery results

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

concurrency:
  group: scrape-general
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies for Playwright
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run general scraper
        run: |
          python -m scripts.scrape_all_states_dom_v2

      - name: Run audit bad number counts
        run: |
          python -m scripts.audit_bad_number_counts || true